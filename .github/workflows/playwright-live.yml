name: 🧪 Playwright Live Tests

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target_url:
        description: "Optional live URL (example: https://www.omerzahid.com). If empty, tests run against local preview build."
        required: false
        type: string

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.target_url || '' }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Project (local preview mode)
        if: ${{ env.PLAYWRIGHT_BASE_URL == '' }}
        run: npm run build

      - name: 🚀 Start Local Preview Server
        if: ${{ env.PLAYWRIGHT_BASE_URL == '' }}
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          echo "PLAYWRIGHT_BASE_URL=http://127.0.0.1:4173" >> "$GITHUB_ENV"

      - name: ⏳ Wait for Local Server
        if: ${{ env.PLAYWRIGHT_BASE_URL == '' }}
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then
              echo "Local preview server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Local preview server failed to start"
          cat preview.log || true
          exit 1

      - name: 🌐 Show Playwright Target
        run: |
          if [ -z "$PLAYWRIGHT_BASE_URL" ]; then
            echo "Running Playwright against local preview server"
          else
            echo "Running Playwright against live URL: $PLAYWRIGHT_BASE_URL"
          fi

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: 🔎 Debug Playwright Context
        run: |
          echo "PLAYWRIGHT_BASE_URL=${PLAYWRIGHT_BASE_URL:-<local-webServer-mode>}"
          npx playwright --version

      - name: ✅ Run Playwright Tests
        run: npm run test:e2e

      - name: 📤 Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            preview.log
          retention-days: 7
