name: 🤖 Ask-Me Weekly Health Check

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      tests_passed: ${{ steps.run_tests.outcome == 'success' }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Project
        run: npm run build

      - name: 🚀 Start Local Preview Server
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          echo "PLAYWRIGHT_BASE_URL=http://127.0.0.1:4173" >> "$GITHUB_ENV"

      - name: ⏳ Wait for Local Server
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then
              echo "Local preview server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Local preview server failed to start"
          cat preview.log || true
          exit 1

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: ✅ Run Ask-Me Playwright Tests
        id: run_tests
        run: npx playwright test tests/e2e/ask-me.spec.js
        continue-on-error: true

      - name: 📤 Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: askme-weekly-report
          path: |
            playwright-report/
            test-results/
            preview.log
          retention-days: 14

      - name: 🚨 Create Issue on Failure
        if: steps.run_tests.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelName = 'askme-health';
            const now = new Date();
            const datePart = `${now.getUTCFullYear()}-${String(now.getUTCMonth() + 1).padStart(2, '0')}-${String(now.getUTCDate()).padStart(2, '0')}`;
            const title = `🤖 Ask-Me Health Check Failed - ${datePart}`;

            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: 'd73a4a',
                  description: 'Ask-Me weekly health check failures'
                });
              } else {
                throw error;
              }
            }

            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: labelName,
              per_page: 100
            });

            const duplicate = existing.data.find(issue => issue.title.trim() === title);
            if (duplicate) {
              core.info(`Issue already exists: #${duplicate.number}`);
              return;
            }

            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              '## Ask-Me Weekly Health Check Failed',
              '',
              `**Run:** [View workflow run](${runUrl})`,
              `**Date:** ${datePart}`,
              '',
              '### What to investigate',
              '- [ ] Review the Playwright test report artifact from the failing run',
              '- [ ] Check `tests/e2e/ask-me.spec.js` for failing test details',
              '- [ ] Verify the AI service endpoint is reachable (`src/services/aiApi.js`)',
              '- [ ] Confirm the AskMe component renders correctly (`src/features/askme/AskMe.jsx`)',
              '- [ ] Check for any recent changes that may have broken the feature',
              '',
              '### Validation steps once fixed',
              '- [ ] `npm run lint`',
              '- [ ] `npm run build`',
              '- [ ] Re-run this workflow to confirm tests pass',
              '',
              '### Notes',
              '- Link PRs and fixes here.',
              '- Close this issue once the weekly run passes.'
            ].join('\n');

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: [labelName]
            });

            core.info(`Created health check issue #${created.data.number}`);
