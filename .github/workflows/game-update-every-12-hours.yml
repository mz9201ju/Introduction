name: 🎮 Game Update Planner (Every 12 Hours)

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-12h-game-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure tracking label exists
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelName = 'game-update-12h';

            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
              core.info(`Label '${labelName}' already exists.`);
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: '1f6feb',
                  description: 'Recurring game updates every 12 hours'
                });
                core.info(`Created label '${labelName}'.`);
              } else {
                throw error;
              }
            }

      - name: Create 12-hour game update issue (if missing)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = new Date();

            const datePart = `${now.getUTCFullYear()}-${String(now.getUTCMonth() + 1).padStart(2, '0')}-${String(now.getUTCDate()).padStart(2, '0')}`;
            const slot = now.getUTCHours() < 12 ? '00-12 UTC' : '12-24 UTC';
            const title = `🎮 Game Update - ${datePart} (${slot})`;

            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'game-update-12h',
              per_page: 100
            });

            const duplicate = existing.data.find(issue => issue.title.trim() === title);
            if (duplicate) {
              core.info(`Issue already exists for ${datePart} ${slot}: #${duplicate.number}`);
              return;
            }

            const body = [
              '## 12-Hour Game Update Checklist',
              '',
              'Source guidance: `src/features/game/agent.md`',
              '',
              '### Required work',
              '- [ ] Add one gameplay feature (mechanic/enemy/power-up/challenge)',
              '- [ ] Add one stability or performance improvement',
              '- [ ] Add one desktop/mobile UX polish item',
              '- [ ] Confirm no duplicate logic introduced',
              '- [ ] Keep business logic in `src/features/game/gameScripts` as needed',
              '',
              '### Validation',
              '- [ ] `npm.cmd run lint`',
              '- [ ] `npm.cmd run build`',
              '- [ ] Verify gameplay on desktop controls',
              '- [ ] Verify gameplay on mobile/touch controls',
              '',
              '### Notes',
              '- Keep changes focused and backward-compatible.',
              '- Link PRs and test notes here.'
            ].join('\n');

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['game-update-12h']
            });

            core.info(`Created 12-hour game update issue #${created.data.number}`);
